<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Quét QR</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="../css/student-scan.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">

        <a class="navbar-brand">
            Quét mã QR
        </a>

        <a href="dashboard.html"
           class="btn btn-light">
            Quay lại
        </a>

    </div>
</nav>


<div class="container mt-5">

    <div class="scan-card">

        <h2>
            Điểm danh bằng QR
        </h2>

        <p class="scan-text">
            Đưa mã QR vào khung bên dưới
        </p>


        <!-- Camera -->
        <div class="camera-frame">

            <div class="scan-line"></div>

            <div id="reader">

                Camera sẽ hiển thị tại đây

            </div>

        </div>


        <!-- Kết quả -->
        <div class="result-box">

            <h5>Kết quả quét</h5>

            <div id="scanResult">

            </div>

        </div>

    </div>

</div>


<script src="../js/student-scan.js"></script>

</body>
</html>
