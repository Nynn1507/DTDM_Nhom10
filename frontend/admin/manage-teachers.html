<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Quản lý Giảng viên</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="../css/manage-teachers.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">

    <div class="container">

        <a class="navbar-brand">

            Quản lý Giảng viên

        </a>

        <a href="dashboard.html"
           class="btn btn-light">

            Quay lại

        </a>

    </div>

</nav>


<div class="container mt-5">

    <div class="teacher-card">

        <div class="header">

            <h2>Danh sách giảng viên</h2>

            <button class="btn-add">

                + Thêm giảng viên

            </button>

        </div>


        <div class="table-responsive">

            <table class="table">

                <thead>

                    <tr>

                        <th>Mã GV</th>

                        <th>Họ tên</th>

                        <th>Khoa</th>

                        <th>Email</th>

                        <th>Tài khoản</th>

                    </tr>

                </thead>


                <tbody id="teacherTable">

                    <!-- Backend sẽ thêm dữ liệu -->

                </tbody>

            </table>

        </div>

    </div>

</div>

<script src="../js/api.js"></script>
<script src="../js/manage-teachers.js"></script>

</body>
</html>
