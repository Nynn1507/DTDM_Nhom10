<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Thống kê hệ thống</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="../css/admin-statistics.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">

    <div class="container">

        <a class="navbar-brand">

            Thống kê hệ thống

        </a>

        <a href="dashboard.html"
           class="btn btn-light">

            Quay lại

        </a>

    </div>

</nav>


<div class="container mt-5">

    <!-- Cards -->
    <div class="row">

        <div class="col-md-3 mb-4">

            <div class="stats-card">

                <h5>Tổng sinh viên</h5>

                <h2 id="totalStudents"></h2>

            </div>

        </div>


        <div class="col-md-3 mb-4">

            <div class="stats-card">

                <h5>Tổng giảng viên</h5>

                <h2 id="totalTeachers"></h2>

            </div>

        </div>


        <div class="col-md-3 mb-4">

            <div class="stats-card">

                <h5>Tổng môn học</h5>

                <h2 id="totalCourses"></h2>

            </div>

        </div>


        <div class="col-md-3 mb-4">

            <div class="stats-card">

                <h5>Tổng buổi học</h5>

                <h2 id="totalSessions"></h2>

            </div>

        </div>

    </div>


    <!-- Attendance Rate -->
    <div class="chart-card">

        <h3>

            Tỷ lệ điểm danh

        </h3>

        <div id="attendanceChart">

            Chart.js sẽ hiển thị tại đây

        </div>

    </div>


    <!-- Monthly Statistics -->
    <div class="chart-card mt-4">

        <h3>

            Thống kê theo tháng

        </h3>

        <div id="monthlyChart">

            Chart.js sẽ hiển thị tại đây

        </div>

    </div>

</div>

<script src="../js/admin-statistics.js"></script>

</body>
</html>
