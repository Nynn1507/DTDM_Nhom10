<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="../css/admin-dashboard.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">

    <div class="container">

        <a class="navbar-brand">

            Admin Dashboard

        </a>

        <a href="../index.html"
           class="btn btn-light">

            Đăng xuất

        </a>

    </div>

</nav>


<div class="container mt-5">

    <!-- Profile -->
    <div class="card profile-card">

        <div class="card-body">

            <h3 id="adminName">

                Xin chào,

            </h3>

            <p id="adminID">

                Mã Admin:

            </p>

        </div>

    </div>


    <!-- Quick Actions -->
    <div class="row mt-4">

        <div class="col-md-3 mb-3">

            <a href="manage-students.html"
               class="action-card">

                <h4>🎓</h4>

                <h5>Quản lý sinh viên</h5>

            </a>

        </div>


        <div class="col-md-3 mb-3">

            <a href="manage-teachers.html"
               class="action-card">

                <h4>👨‍🏫</h4>

                <h5>Quản lý giảng viên</h5>

            </a>

        </div>


        <div class="col-md-3 mb-3">

            <a href="manage-courses.html"
               class="action-card">

                <h4>📚</h4>

                <h5>Quản lý môn học</h5>

            </a>

        </div>


        <div class="col-md-3 mb-3">

            <a href="statistics.html"
               class="action-card">

                <h4>📊</h4>

                <h5>Thống kê</h5>

            </a>

        </div>

    </div>


    <!-- Tổng quan -->
    <div class="section">

        <h3 class="title">

            Tổng quan hệ thống

        </h3>

        <div class="row">

            <div class="col-md-4">

                <div class="summary-card">

                    <h5>Tổng sinh viên</h5>

                    <h2 id="totalStudents">

                    </h2>

                </div>

            </div>


            <div class="col-md-4">

                <div class="summary-card">

                    <h5>Tổng giảng viên</h5>

                    <h2 id="totalTeachers">

                    </h2>

                </div>

            </div>


            <div class="col-md-4">

                <div class="summary-card">

                    <h5>Tổng môn học</h5>

                    <h2 id="totalCourses">

                    </h2>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="../js/admin-dashboard.js"></script>

</body>
</html>
