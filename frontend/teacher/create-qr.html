<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo mã QR</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="../css/teacher-create-qr.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">

        <a class="navbar-brand">
            Tạo mã QR điểm danh
        </a>

        <a href="dashboard.html"
           class="btn btn-light">
            Quay lại
        </a>

    </div>
</nav>


<div class="container mt-5">

    <div class="qr-card">

        <h2>Tạo mã QR</h2>


        <div class="input-group">

            <label>Môn học</label>

            <select id="subject">
                <option>Chọn môn học</option>
            </select>

        </div>


        <div class="input-group">

            <label>Lớp học</label>

            <select id="class">

                <option>Chọn lớp học</option>

            </select>

        </div>


        <div class="input-group">

            <label>Ngày học</label>

            <input type="date"
                   id="date">

        </div>


        <div class="input-group">

            <label>Tiết học</label>

            <input type="text"
                   id="session"
                   placeholder="Ví dụ: 1-3">

        </div>


        <button class="btn-generate">

            Tạo mã QR

        </button>


        <div class="qr-container">

            <div id="qrCode">

                QR sẽ hiển thị tại đây

            </div>

        </div>

    </div>

</div>

<script src="../js/api.js"></script>
<script src="../js/teacher-create-qr.js"></script>

</body>
</html>
