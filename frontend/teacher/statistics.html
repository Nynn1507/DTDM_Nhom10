<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Thống kê</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="../css/teacher-statistics.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">

    <div class="container">

        <a class="navbar-brand">

            Thống kê điểm danh

        </a>

        <a href="dashboard.html"
           class="btn btn-light">

            Quay lại

        </a>

    </div>

</nav>


<div class="container mt-5">

    <!-- Statistics Cards -->
    <div class="row">

        <div class="col-md-4 mb-4">

            <div class="stats-card">

                <h5>Tổng số buổi học</h5>

                <h2 id="totalSessions">

                </h2>

            </div>

        </div>


        <div class="col-md-4 mb-4">

            <div class="stats-card">

                <h5>Tổng số sinh viên</h5>

                <h2 id="totalStudents">

                </h2>

            </div>

        </div>


        <div class="col-md-4 mb-4">

            <div class="stats-card">

                <h5>Tỷ lệ điểm danh</h5>

                <h2 id="attendanceRate">

                </h2>

            </div>

        </div>

    </div>


    <!-- Chart -->
    <div class="chart-card">

        <h3>

            Biểu đồ thống kê

        </h3>

        <div id="chartContainer">

            <!-- Chart.js sẽ hiển thị ở đây -->

        </div>

    </div>

</div>

<script src="../js/teacher-statistics.js"></script>

</body>
</html>
