<!DOCTYPE html>

<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" href="../css/student-dashboard.css">


</head>
<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">


    <a class="navbar-brand">
        Student Dashboard
    </a>

    <a href="../index.html" class="btn btn-light">
        Đăng xuất
    </a>

</div>


</nav>

<div class="container mt-5">


<!-- Profile -->
<div class="card profile-card">

    <div class="card-body">

        <h3 id="studentName">
            Xin chào,
        </h3>

        <p id="studentID">
            MSSV:
        </p>

        <p id="studentClass">
            Lớp:
        </p>

    </div>

</div>


<!-- Quick Actions -->
<div class="row mt-4">

    <div class="col-md-4 mb-3">

        <a href="../student/history.html"
           class="action-card">

            <h4>📋</h4>

            <h5>Lịch sử điểm danh</h5>

        </a>

    </div>

    <div class="col-md-4 mb-3">

        <a href="../student/scan.html"
           class="action-card">

            <h4>📷</h4>

            <h5>Quét QR</h5>

        </a>

    </div>

</div>


<!-- Subject Today -->
<div class="section">

    <h3 class="title">
        Môn học hôm nay
    </h3>

    <div class="row" id="subjectContainer">

    </div>

</div>


<!-- Recent Attendance -->
<div class="section mt-5">

    <h3 class="title">
        Điểm danh gần đây
    </h3>

    <div class="card recent-card">

        <div class="card-body">

            <div id="recentAttendance">

            </div>

        </div>

    </div>

</div>


</div>

<script src="../js/api.js"></script>
<script src="../js/student-dashboard.js"></script>

</body>
</html>
